<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Example system context diagram</title>
  <desc id="desc">An operations user works through a service portal that authenticates with an identity provider and sends updates through a notification service.</desc>
  <rect width="960" height="540" fill="#FFFFFF"/>
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033">
    <circle cx="120" cy="186" r="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="120" y1="204" x2="120" y2="266" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="82" y1="224" x2="158" y2="224" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="120" y1="266" x2="88" y2="320" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="120" y1="266" x2="152" y2="320" stroke="#CBD5E1" stroke-width="2"/>
    <text x="120" y="356" text-anchor="middle">Operations user</text>

    <rect x="340" y="212" width="220" height="104" rx="8" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="2"/>
    <text x="450" y="270" text-anchor="middle" font-size="16">Service portal</text>

    <rect x="720" y="120" width="184" height="88" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="812" y="169" text-anchor="middle">Identity provider</text>

    <rect x="720" y="318" width="184" height="88" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="812" y="367" text-anchor="middle">Notification service</text>

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#526071"/>
      </marker>
    </defs>

    <path d="M 168 264 H 340" fill="none" stroke="#526071" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="226" y="248" width="72" height="24" fill="#FFFFFF"/>
    <text x="262" y="265" text-anchor="middle" font-size="12" fill="#1F2937">Manages work</text>

    <path d="M 560 248 H 640 V 164 H 720" fill="none" stroke="#526071" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="614" y="192" width="86" height="24" fill="#FFFFFF"/>
    <text x="657" y="209" text-anchor="middle" font-size="12" fill="#1F2937">Authenticates</text>

    <path d="M 560 282 H 640 V 362 H 720" fill="none" stroke="#526071" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="610" y="312" width="90" height="24" fill="#FFFFFF"/>
    <text x="655" y="329" text-anchor="middle" font-size="12" fill="#1F2937">Sends updates</text>
  </g>
</svg>
